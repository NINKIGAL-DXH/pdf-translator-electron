name: Build macOS DMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install flask pymupdf openai requests tqdm tenacity numpy onnxruntime

      - name: Install Node deps
        run: npm install

      - name: Copy Python backend
        run: |
          cp ../pdf-translator/app.py . 2>/dev/null || true
          cp -r ../pdf-translator/pdf2zh . 2>/dev/null || true
          cp -r ../pdf-translator/templates . 2>/dev/null || true

      - name: Build frontend
        run: npm run build

      - name: Build Electron DMG
        run: npx electron-builder build --mac dmg --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Translator-macOS
          path: dist-desktop/*.dmg
